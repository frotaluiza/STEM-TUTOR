name: Sync KB to Notion

on:
  push:
    branches:
      - main
      - feature/mind-map-module
    paths:
      - 'kb/**'
      - 'project-state/**'
      - 'scripts/kb/**'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Specific session slug to sync (optional)'
        required: false
        type: string

jobs:
  sync-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx python-dotenv

      - name: Detect changed files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slug=${{ inputs.slug }}" >> $GITHUB_OUTPUT
            echo "mode=single" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 -- 'kb/sessoes/' 2>/dev/null || echo "")
            if [ -z "$CHANGED" ]; then
              CHANGED=$(git diff --name-only HEAD~2 -- 'kb/sessoes/' 2>/dev/null | sed 's|kb/sessoes/||;s|\.md||' | tr '\n' ',' | sed 's/,$//')
            else
              CHANGED=$(echo "$CHANGED" | sed 's|kb/sessoes/||;s|\.md||' | tr '\n' ',' | sed 's/,$//')
            fi
            echo "slug=$CHANGED" >> $GITHUB_OUTPUT
            echo "mode=batch" >> $GITHUB_OUTPUT
          fi

      - name: Sync sessions to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SESSOES_DB_ID: "372191ce-57f9-810c-99aa-d5fa31deb926"
          PROJETOS_DB_ID: "9172be34-0056-4f38-aa2a-093339bb5790"
        run: |
          python scripts/kb/gh-sync-notion.py \
            --slugs "${{ steps.changes.outputs.slug }}" \
            --mode "${{ steps.changes.outputs.mode }}"
